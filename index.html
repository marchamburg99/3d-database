<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>3D-Bibliothek – heimWatt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #002432;
      --lime:    #B5D94F;
      --purple:  #5B42F1;
      --teal:    #0d7a6e;
      --bg:      #F0F2F5;
      --white:   #FFFFFF;
      --text:    #002432;
      --muted:   #7a8a94;
      --card-r:  0px;
    }

    html, body {
      min-height: 100%;
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Header ─────────────────────────────── */
    header {
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,36,50,0.07);
      padding: 11px 20px;
      padding-top: max(11px, env(safe-area-inset-top));
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo img { height: 26px; display: block; text-decoration: none; }

    /* ── Hero-Banner ────────────────────────── */
    .hero {
      background: var(--navy);
      padding: 28px 20px 24px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -40px;
      width: 220px; height: 220px;
      background: var(--lime);
      border-radius: 50%;
      opacity: 0.08;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -60px;
      width: 280px; height: 280px;
      background: var(--purple);
      border-radius: 50%;
      opacity: 0.1;
    }

    .hero-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--lime);
      margin-bottom: 8px;
    }

    .hero-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -0.5px;
    }

    .hero-title span {
      color: var(--lime);
    }

    .hero-sub {
      margin-top: 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
    }

    .hero-stats {
      display: flex;
      gap: 16px;
      margin-top: 20px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-num {
      font-size: 20px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
    }

    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.12);
    }

    /* ── Content ────────────────────────────── */
    main {
      max-width: 600px;
      margin: 0 auto;
      padding-bottom: max(40px, env(safe-area-inset-bottom));
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 20px 16px 0;
    }

    .section-head h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--navy);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-head h2::before {
      content: '';
      display: block;
      width: 4px;
      height: 18px;
      background: var(--lime);
      border-radius: 2px;
    }

    .count-pill {
      background: var(--navy);
      color: var(--white);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }

    /* ── Model Grid ─────────────────────────── */
    .model-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
    }

    .model-card {
      aspect-ratio: 1 / 1;
      background: var(--accent-color, var(--navy));
      text-decoration: none;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 14px;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      transition: filter 0.15s;
    }

    .model-card:active {
      filter: brightness(0.88);
    }

    /* Thumbnail subtil als Textur im Hintergrund */
    .card-thumb-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.18;
      mix-blend-mode: luminosity;
    }

    /* Badge-Gruppe oben rechts */
    .thumb-badges {
      display: flex;
      gap: 5px;
      align-self: flex-end;
      position: relative;
      z-index: 1;
    }

    .tbadge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      letter-spacing: 0.3px;
      background: rgba(255,255,255,0.2);
      color: white;
      backdrop-filter: blur(6px);
    }

    .tbadge-ar {
      background: rgba(255,255,255,0.9);
      color: var(--navy);
    }

    /* Text unten */
    .card-body {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .card-category {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.6);
    }

    .card-name {
      font-size: 15px;
      font-weight: 800;
      color: white;
      line-height: 1.2;
      letter-spacing: -0.2px;
    }

    .card-cta {
      margin-top: 6px;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    /* ── Loading ─────────────────────────────── */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 15px;
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">
    <img src="heimwatt-logo.png" alt="heimWatt">
  </a>
</header>

<div class="hero">
  <p class="hero-label">Produktkonfigurator</p>
  <h1 class="hero-title">3D-<span>Bibliothek</span></h1>
  <p class="hero-sub">Tippe auf ein Modell – in 3D erkunden,<br>direkt in VR oder AR erleben.</p>
  <div class="hero-stats">
    <div class="stat">
      <span class="stat-num" id="stat-count">–</span>
      <span class="stat-label">Modelle</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-num">3D</span>
      <span class="stat-label">WebGL Viewer</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-num">AR</span>
      <span class="stat-label">Quick Look</span>
    </div>
  </div>
</div>

<main>
  <div class="section-head">
    <h2>Alle Modelle</h2>
    <span class="count-pill" id="count-pill">–</span>
  </div>

  <div class="model-grid" id="grid">
    <div class="loading">Modelle werden geladen…</div>
  </div>
</main>

<script>
async function loadModels() {
  const grid = document.getElementById('grid');
  try {
    const res = await fetch('data/models.json');
    const models = await res.json();

    document.getElementById('stat-count').textContent = models.length;
    document.getElementById('count-pill').textContent = models.length;

    grid.innerHTML = models.map(m => `
      <a class="model-card" href="viewer.html?id=${encodeURIComponent(m.id)}"
         style="--accent-color:${m.color}">
        <div class="card-thumb-bg"
             style="background-image:url('thumbnails/${m.id}.png')"></div>
        <div class="thumb-badges">
          <span class="tbadge">VR</span>
          <span class="tbadge tbadge-ar">AR</span>
        </div>
        <div class="card-body">
          <span class="card-category">${m.category}</span>
          <span class="card-name">${m.name}</span>
          <span class="card-cta">
            Ansehen
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M4 2.5l3.5 3.5L4 9.5" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
      </a>
    `).join('');
  } catch (e) {
    grid.innerHTML = `<div class="loading">Fehler beim Laden der Modelle.</div>`;
  }
}

loadModels();
</script>
</body>
</html>
