<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>3D-Modelle – heimWatt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #002432;
      --lime:   #B5D94F;
      --purple: #5B42F1;
      --bg:     #F5F5F5;
      --white:  #FFFFFF;
      --text:   #1a1a2e;
      --muted:  #6b7280;
    }

    html, body {
      height: 100%;
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* Header */
    header {
      background: var(--navy);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      padding-top: max(16px, env(safe-area-inset-top));
    }

    .logo {
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .logo img {
      height: 30px;
      background: white;
      padding: 4px 10px;
      border-radius: 8px;
    }

    header h1 {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      text-align: right;
    }

    /* Main */
    main {
      padding: 20px 16px;
      max-width: 600px;
      margin: 0 auto;
      padding-bottom: max(32px, env(safe-area-inset-bottom));
    }

    .section-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .section-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* Model Grid */
    .model-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .model-card {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      box-shadow: 0 2px 8px rgba(0,36,50,0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .model-card:active {
      transform: scale(0.98);
      box-shadow: 0 1px 4px rgba(0,36,50,0.06);
    }

    .card-visual {
      width: 90px;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-visual svg {
      width: 44px;
      height: 44px;
      opacity: 0.9;
    }

    .card-body {
      padding: 16px 16px 16px 4px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .card-category {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
    }

    .card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.3;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }

    .card-arrow {
      display: flex;
      align-items: center;
      padding-right: 16px;
      color: var(--muted);
    }

    /* Badge */
    .badge-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--bg);
      color: var(--navy);
    }

    .badge.vr { background: var(--navy); color: var(--white); }
    .badge.ar { background: var(--lime); color: var(--navy); }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 15px;
    }

    /* Empty */
    .empty {
      text-align: center;
      padding: 60px 20px;
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">
    <img src="heimwatt-logo.png" alt="heimWatt">
  </a>
  <h1>3D-Bibliothek</h1>
</header>

<main>
  <p class="section-title">3D-Modelle</p>
  <p class="section-sub">Tippe auf ein Modell zum Anzeigen – in 3D oder direkt in VR/AR</p>

  <div class="model-grid" id="grid">
    <div class="loading">Modelle werden geladen…</div>
  </div>
</main>

<script>
const ICON_SVG = `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="12" y="8" width="24" height="32" rx="4" fill="white" fill-opacity="0.25" stroke="white" stroke-width="2"/>
  <rect x="16" y="14" width="16" height="3" rx="1.5" fill="white" fill-opacity="0.7"/>
  <rect x="16" y="20" width="10" height="3" rx="1.5" fill="white" fill-opacity="0.7"/>
  <circle cx="34" cy="34" r="8" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1.5"/>
  <path d="M31 34l2 2 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

async function loadModels() {
  const grid = document.getElementById('grid');
  try {
    const res = await fetch('data/models.json');
    const models = await res.json();
    grid.innerHTML = models.map(m => `
      <a class="model-card" href="viewer.html?id=${encodeURIComponent(m.id)}" data-id="${m.id}">
        <div class="card-visual" style="background:${m.color}">
          ${ICON_SVG}
        </div>
        <div class="card-body">
          <span class="card-category">${m.category}</span>
          <span class="card-name">${m.name}</span>
          <span class="card-desc">${m.description}</span>
          <div class="badge-row">
            <span class="badge vr">VR</span>
            <span class="badge ar">AR</span>
            <span class="badge">3D</span>
          </div>
        </div>
        <div class="card-arrow">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M7.5 5l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </a>
    `).join('');
  } catch (e) {
    grid.innerHTML = `<div class="empty"><p>Fehler beim Laden der Modelle.</p></div>`;
  }
}

loadModels();
</script>
</body>
</html>
