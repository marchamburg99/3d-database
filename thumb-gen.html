<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}</script>
</head>
<body style="margin:0;background:#0d1b2a;display:flex;flex-wrap:wrap">
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const models = [
  { id: 'waermepumpe-wolf',                       file: 'models/waermepumpe_wolf.glb' },
  { id: 'waermepumpe-wolf-mit-bodenkonsole',       file: 'models/waermepumpe_wolf_mit_bodenkonsole.glb' },
  { id: 'waermepumpe-wolf-bodenkonsole-abstaende', file: 'models/waermepumpe_wolf_bodenkonsole_abstaende.glb' },
];

async function renderModel(file) {
  const canvas = document.createElement('canvas');
  canvas.width = 600; canvas.height = 600;
  canvas.setAttribute('data-file', file);
  document.body.appendChild(canvas);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
  renderer.setSize(600, 600);
  renderer.setPixelRatio(1);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.3;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d1b2a);
  const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 100);
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const sun = new THREE.DirectionalLight(0xffffff, 2.5);
  sun.position.set(3, 5, 4); scene.add(sun);
  const fill = new THREE.DirectionalLight(0xb5d94f, 0.9);
  fill.position.set(-3, 2, -2); scene.add(fill);

  return new Promise((resolve) => {
    new GLTFLoader().load(file, gltf => {
      const g = gltf.scene;
      scene.add(g);
      const box = new THREE.Box3().setFromObject(g);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 2.0 / maxDim;
      g.scale.setScalar(scale);
      const sc = center.clone().multiplyScalar(scale);
      g.position.set(-sc.x, -box.min.y * scale, -sc.z);
      const dist = maxDim * scale * 1.8;
      camera.position.set(dist * 0.55, dist * 0.45, dist);
      camera.lookAt(0, size.y * scale * 0.4, 0);
      renderer.render(scene, camera);
      resolve(canvas.toDataURL('image/png'));
    });
  });
}

(async () => {
  const results = {};
  for (const m of models) {
    results[m.id] = await renderModel(m.file);
    console.log('rendered:', m.id);
  }
  window._thumbData = results;
  const done = document.createElement('div');
  done.id = 'done';
  document.body.appendChild(done);
})();
</script></body></html>
